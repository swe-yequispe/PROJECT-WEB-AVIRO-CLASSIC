<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Hotel Aviro</title>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,300..800;1,300..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
          extend: {
              colors: {
                  "primary": "#006633",
                  "secondary": "#CC3300",
                  "muted": "#999966",
                  "creme": "#F2F2D8",
                  "background-light": "#FFFFFF",
                  "background-dark": "#006633",
                  "surface": "#F2F2D8",
                  "border-muted": "rgba(0,102,51,0.1)"
              },
              fontFamily: {
                  "display": ["Karla", "sans-serif"],
                  "serif": ["Playfair Display", "serif"]
              },
              borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "9999px"},
          },
      },
    }
  </script>
  <style type="text/tailwindcss">
    body { font-family: 'Karla', sans-serif; }
    h1, h2 {
      font-family: 'Playfair Display', serif !important;
      font-weight: 600 !important;
      letter-spacing: -0.02em !important;
      line-height: 1.05 !important;
      text-transform: none !important;
    }
    h3, h4, h5, h6 {
      font-family: 'Playfair Display', serif !important;
      font-weight: 600 !important;
      letter-spacing: -0.01em !important;
      line-height: 1.15 !important;
      text-transform: none !important;
    }
    h1 { font-size: clamp(2.75rem, 5vw, 6rem) !important; }
    h2 { font-size: clamp(2rem, 3.5vw, 3.5rem) !important; }
    h3 { font-size: clamp(1.5rem, 2.5vw, 2.5rem) !important; }
    .editorial-text { font-family: 'Playfair Display', serif; font-style: italic; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    :root {
        --charcoal: #1a1a1a;
        --forest: #223a2d;
        --border: #333333;
    }
    .booking-sidebar {
        @apply sticky top-[88px] h-fit;
    }
    .layout-container > header {
      min-height: 88px;
      box-shadow: 0 12px 24px -24px rgba(0, 0, 0, 0.45);
    }
    .layout-container > footer img[alt="Logo Aviró Hotel Plaza"] {
      height: 8rem;
      margin-inline: auto;
      object-fit: contain;
    }
    .nav-link {
      position: relative;
      text-decoration: none !important;
    }
    .nav-link::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -0.45rem;
      width: 100%;
      height: 2px;
      background: #CC3300;
      transform: scaleX(0);
      transform-origin: center;
      transition: transform 220ms ease;
    }
    .nav-link:hover::after,
    .nav-link.nav-active::after {
      transform: scaleX(1);
    }
    .nav-link.nav-active {
      color: #006633 !important;
      font-weight: 800 !important;
    }
    .bg-zinc-900 .nav-link.nav-active,
    .bg-zinc-950 .nav-link.nav-active,
    .bg-black .nav-link.nav-active {
      color: #F2F2D8 !important;
    }
    input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(1);
    }
  </style>
</head>
<body class="font-display transition-colors duration-300 bg-white text-primary">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
